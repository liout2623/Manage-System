<!doctype html>
<html lang="zh-cn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>医馆管理系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --brand: #0d9488;
      --brand-dark: #0f766e;
      --brand-end: #0891b2;
      --bg: #f0f4f8;
    }
    * { box-sizing: border-box; }
    body {
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      margin: 0;
    }

    /* ── Navbar ─────────────────────────────────── */
    .app-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      height: 62px;
      background: linear-gradient(135deg, #134e4a 0%, #0d9488 60%, #0891b2 100%);
      display: flex; align-items: center; padding: 0 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,.18);
    }
    .app-nav .brand {
      color: #fff; font-size: 1.1rem; font-weight: 700;
      display: flex; align-items: center; gap: 8px;
      text-decoration: none; white-space: nowrap;
    }
    .nav-tabs-bar {
      display: flex; gap: 4px; margin-left: 28px; list-style: none; padding: 0; margin-bottom: 0;
    }
    .nav-tabs-bar .tab-btn {
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,.75);
      padding: 6px 16px; border-radius: 8px;
      font-size: .9rem; font-weight: 500;
      display: flex; align-items: center; gap: 6px;
      transition: background .18s, color .18s;
    }
    .nav-tabs-bar .tab-btn:hover   { background: rgba(255,255,255,.15); color: #fff; }
    .nav-tabs-bar .tab-btn.active  { background: rgba(255,255,255,.22); color: #fff; }
    .nav-right {
      margin-left: auto; display: flex; align-items: center; gap: 12px;
    }
    .user-info {
      display: flex; align-items: center; gap: 8px;
      color: rgba(255,255,255,.88); font-size: .875rem;
    }
    .user-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(255,255,255,.22);
      display: flex; align-items: center; justify-content: center; font-size: 1rem;
    }
    .btn-logout {
      background: rgba(255,255,255,.14); border: 1px solid rgba(255,255,255,.3);
      color: #fff; border-radius: 8px; padding: 5px 14px; font-size: .85rem; cursor: pointer;
      transition: background .18s;
    }
    .btn-logout:hover { background: rgba(255,255,255,.25); }

    /* ── Page wrapper ───────────────────────────── */
    .page { padding-top: 78px; padding-bottom: 48px; }

    /* ── Section card ───────────────────────────── */
    .s-card {
      background: #fff; border-radius: 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,.07), 0 6px 20px rgba(0,0,0,.04);
    }
    .s-card-head {
      padding: 20px 26px 16px;
      border-bottom: 1px solid #f1f5f9;
      display: flex; align-items: center; justify-content: space-between;
    }
    .s-card-head h5 {
      margin: 0; font-size: 1rem; font-weight: 700; color: #1e293b;
      display: flex; align-items: center; gap: 8px;
    }
    .s-card-head h5 i { color: var(--brand); }
    .s-card-body { padding: 20px 26px; }

    /* ── Toolbar ────────────────────────────────── */
    .toolbar {
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 18px;
    }
    .search-box { position: relative; flex: 1; min-width: 200px; }
    .search-box i {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%); color: #9ca3af;
    }
    .search-box input {
      width: 100%; height: 38px; padding: 0 12px 0 36px;
      border: 1.5px solid #e5e7eb; border-radius: 10px;
      font-size: .9rem; transition: border-color .2s, box-shadow .2s;
    }
    .search-box input:focus {
      outline: none; border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(13,148,136,.12);
    }
    .filter-select {
      height: 38px; border: 1.5px solid #e5e7eb; border-radius: 10px;
      font-size: .9rem; padding: 0 32px 0 10px;
      background-color: #fff; cursor: pointer;
      transition: border-color .2s;
    }
    .filter-select:focus { outline: none; border-color: var(--brand); }
    .btn-refresh {
      height: 38px; padding: 0 14px; border: 1.5px solid #e5e7eb;
      border-radius: 10px; background: #fff; color: #6b7280;
      font-size: .875rem; cursor: pointer; display: flex; align-items: center; gap: 5px;
      transition: background .18s;
    }
    .btn-refresh:hover { background: #f9fafb; }
    .btn-add {
      height: 38px; padding: 0 18px; border: none; border-radius: 10px;
      background: linear-gradient(135deg, var(--brand), var(--brand-end));
      color: #fff; font-size: .9rem; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: opacity .2s, transform .1s;
    }
    .btn-add:hover { opacity: .9; transform: translateY(-1px); }
    .btn-add:active { transform: translateY(0); }

    /* ── Data table ─────────────────────────────── */
    .data-tbl { width: 100%; border-collapse: separate; border-spacing: 0; }
    .data-tbl thead th {
      background: #f8fafc; color: #64748b;
      font-size: .78rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .05em;
      padding: 10px 14px; border-bottom: 1px solid #e2e8f0;
    }
    .data-tbl thead th:first-child { border-radius: 10px 0 0 0; }
    .data-tbl thead th:last-child  { border-radius: 0 10px 0 0; }
    .data-tbl tbody tr { transition: background .14s; }
    .data-tbl tbody tr:hover { background: #f8fafc; }
    .data-tbl tbody td {
      padding: 13px 14px; border-bottom: 1px solid #f1f5f9;
      color: #334155; font-size: .9rem; vertical-align: middle;
    }
    .data-tbl tbody tr:last-child td { border-bottom: none; }
    .id-cell { color: #94a3b8; font-size: .8rem; }
    .strong-cell { font-weight: 600; color: #1e293b; }

    /* ── Badges ─────────────────────────────────── */
    .badge-role  { background:#dbeafe; color:#1d4ed8; padding:3px 9px; border-radius:20px; font-size:.75rem; font-weight:600; }
    .badge-admin { background:#ede9fe; color:#7c3aed; }
    .badge-on    { background:#d1fae5; color:#065f46; padding:3px 9px; border-radius:20px; font-size:.75rem; font-weight:600; }
    .badge-off   { background:#fee2e2; color:#991b1b; padding:3px 9px; border-radius:20px; font-size:.75rem; font-weight:600; }
    .tag-chip    { display:inline-block; background:#f1f5f9; color:#475569; padding:2px 8px; border-radius:20px; font-size:.73rem; margin:1px; }

    /* ── Action buttons ─────────────────────────── */
    .btn-edit {
      padding: 5px 12px; font-size: .8rem; border-radius: 7px; font-weight: 500;
      background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; cursor: pointer;
      transition: background .14s;
    }
    .btn-edit:hover { background: #dbeafe; }
    .btn-del {
      padding: 5px 12px; font-size: .8rem; border-radius: 7px; font-weight: 500;
      background: #fff1f2; color: #e11d48; border: 1px solid #fecdd3; cursor: pointer;
      transition: background .14s;
    }
    .btn-del:hover { background: #ffe4e6; }

    /* ── Empty state ────────────────────────────── */
    .empty-st { text-align: center; padding: 52px 24px; color: #94a3b8; }
    .empty-st i { font-size: 2.6rem; display: block; margin-bottom: 10px; }

    /* ── Modals ─────────────────────────────────── */
    .modal-content { border: none; border-radius: 18px; box-shadow: 0 24px 56px rgba(0,0,0,.16); }
    .modal-header  { border-bottom: 1px solid #f1f5f9; padding: 20px 24px; }
    .modal-title   { font-weight: 700; color: #1e293b; font-size: 1rem; }
    .modal-body    { padding: 22px 24px; }
    .modal-footer  { border-top: 1px solid #f1f5f9; padding: 14px 24px; }
    .form-label    { font-weight: 500; color: #374151; font-size: .875rem; margin-bottom: 5px; }
    .form-control, .form-select {
      border-radius: 10px; border: 1.5px solid #e5e7eb;
      padding: 9px 13px; font-size: .9rem;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-control:focus, .form-select:focus {
      border-color: var(--brand); box-shadow: 0 0 0 3px rgba(13,148,136,.12);
    }
    .btn-submit {
      background: linear-gradient(135deg, var(--brand), var(--brand-end));
      border: none; color: #fff; border-radius: 9px; padding: 9px 24px; font-weight: 600; cursor: pointer;
    }
    .btn-submit:hover { opacity: .9; color: #fff; }
    .btn-cancel {
      border: 1.5px solid #e5e7eb; background: #fff; color: #6b7280;
      border-radius: 9px; padding: 9px 20px; cursor: pointer;
    }
    .btn-cancel:hover { background: #f9fafb; }

    /* ── Toast ──────────────────────────────────── */
    .toast-box {
      position: fixed; top: 72px; right: 20px; z-index: 2000;
      display: flex; flex-direction: column; gap: 8px; pointer-events: none;
    }
    .toast-item {
      min-width: 280px; padding: 13px 16px; border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,.12);
      display: flex; align-items: center; gap: 10px;
      font-size: .88rem; pointer-events: all;
      animation: slideIn .25s ease;
    }
    @keyframes slideIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }
    .toast-ok  { background: #f0fdf4; border-left: 4px solid #22c55e; color: #166534; }
    .toast-err { background: #fff1f2; border-left: 4px solid #ef4444; color: #991b1b; }

    /* ── Footer info ────────────────────────────── */
    .tbl-footer { color: #94a3b8; font-size: .82rem; margin-top: 12px; }
  </style>
</head>
<body>

<!-- ════════════════ Navbar ════════════════ -->
<nav class="app-nav">
  <a class="brand" href="#">🏥 医馆管理系统</a>

  <ul class="nav-tabs-bar">
    <li>
      <button class="tab-btn active" id="tab-users"
              onclick="switchTab('users')">
        <i class="bi bi-people-fill"></i>用户管理
      </button>
    </li>
    <li>
      <button class="tab-btn" id="tab-customers"
              onclick="switchTab('customers')">
        <i class="bi bi-person-heart-fill"></i>客户管理
      </button>
    </li>
  </ul>

  <div class="nav-right">
    <div class="user-info">
      <div class="user-avatar">👤</div>
      <span id="nav-name">管理员</span>
    </div>
    <button class="btn-logout" onclick="logout()">
      <i class="bi bi-box-arrow-right me-1"></i>退出
    </button>
  </div>
</nav>

<!-- ════════════════ Main ════════════════ -->
<div class="page container-fluid px-3 px-lg-5">

  <!-- ── 用户管理面板 ── -->
  <div id="panel-users">
    <div class="s-card">
      <div class="s-card-head">
        <h5><i class="bi bi-people-fill"></i>用户管理</h5>
      </div>
      <div class="s-card-body">
        <div class="toolbar">
          <div class="search-box">
            <i class="bi bi-search"></i>
            <input type="text" id="user-kw" placeholder="搜索用户名、姓名、电话…"
                   oninput="debounce('u', () => loadUsers())">
          </div>
          <select class="filter-select" id="user-role-filter" onchange="loadUsers()">
            <option value="">全部角色</option>
            <option value="ADMIN">ADMIN</option>
            <option value="STAFF">STAFF</option>
          </select>
          <button class="btn-refresh" onclick="loadUsers()">
            <i class="bi bi-arrow-clockwise"></i>刷新
          </button>
          <button class="btn-add" onclick="openUserModal()">
            <i class="bi bi-plus-lg"></i>新增用户
          </button>
        </div>

        <table class="data-tbl">
          <thead>
            <tr>
              <th>ID</th><th>用户名</th><th>姓名</th>
              <th>角色</th><th>电话</th><th>状态</th><th>操作</th>
            </tr>
          </thead>
          <tbody id="users-body">
            <tr><td colspan="7"><div class="empty-st">
              <i class="bi bi-hourglass-split"></i><span>加载中…</span>
            </div></td></tr>
          </tbody>
        </table>
        <div class="tbl-footer" id="users-info"></div>
      </div>
    </div>
  </div>

  <!-- ── 客户管理面板 ── -->
  <div id="panel-customers" style="display:none">
    <div class="s-card">
      <div class="s-card-head">
        <h5><i class="bi bi-person-heart-fill"></i>客户管理</h5>
      </div>
      <div class="s-card-body">
        <div class="toolbar">
          <div class="search-box">
            <i class="bi bi-search"></i>
            <input type="text" id="cust-kw" placeholder="搜索姓名、电话、标签…"
                   oninput="debounce('c', () => loadCustomers())">
          </div>
          <button class="btn-refresh" onclick="loadCustomers()">
            <i class="bi bi-arrow-clockwise"></i>刷新
          </button>
          <button class="btn-add" onclick="openCustModal()">
            <i class="bi bi-plus-lg"></i>新增客户
          </button>
        </div>

        <table class="data-tbl">
          <thead>
            <tr>
              <th>ID</th><th>姓名</th><th>性别</th>
              <th>电话</th><th>邮箱</th><th>标签</th><th>生日</th><th>操作</th>
            </tr>
          </thead>
          <tbody id="custs-body">
            <tr><td colspan="8"><div class="empty-st">
              <i class="bi bi-hourglass-split"></i><span>加载中…</span>
            </div></td></tr>
          </tbody>
        </table>
        <div class="tbl-footer" id="custs-info"></div>
      </div>
    </div>
  </div>

</div><!-- /page -->

<!-- ════════════════ 用户 Modal ════════════════ -->

      <div class="modal-header">

      <div class="modal-body">

        <div class="row g-3">
          <div class="col-6">

<!-- ════════════════ 客户 Modal ════════════════ -->

    <div class="modal-content">

        <h5 class="modal-title" id="custModalTitle">新增客户</h5>

      </div>

          <div class="col-6">

          <div class="col-6">
            <label class="form-label">性别</label>

</div>

<!-- Toast container -->
<div class="toast-box" id="toast-box"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
'use strict';

/* ── Auth guard ──────────────────────────────────────────── */
const TOKEN = localStorage.getItem('token') || '';
if (!TOKEN) { window.location.replace('/'); }
const CUR = JSON.parse(localStorage.getItem('currentUser') || '{}');
document.getElementById('nav-name').textContent =
  CUR.displayName || CUR.username || '管理员';

function logout() {
  localStorage.removeItem('token');
  localStorage.removeItem('currentUser');
  window.location.replace('/');
}

/* ── Tab switching ───────────────────────────────────────── */
function switchTab(tab) {
  ['users','customers'].forEach(t => {
    document.getElementById('panel-' + t).style.display = t === tab ? '' : 'none';
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
  });
}

/* ── API helper ──────────────────────────────────────────── */
async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + TOKEN };
  const resp = await fetch(path, { ...opts, headers: { ...headers, ...(opts.headers||{}) } });
  if (resp.status === 401) { logout(); return; }
  if (!resp.ok) {
    const txt = await resp.text();
    let msg = txt;
    try { const j = JSON.parse(txt); msg = j.message || j.error || txt; } catch {}
    throw new Error(msg || String(resp.status));
  }
  const ct = resp.headers.get('content-type') || '';
  return ct.includes('application/json') ? resp.json() : resp.text();
}
function unwrap(r) { return (r && 'data' in r) ? r.data : r; }
function asList(p) {
  if (Array.isArray(p)) return p;
  if (p && Array.isArray(p.items)) return p.items;
  if (p && Array.isArray(p.list))  return p.list;
  return [];
}

/* ── HTML escape ─────────────────────────────────────────── */
function esc(s) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(s == null ? '' : String(s)));
  return d.innerHTML;
}

/* ── Debounce for search ─────────────────────────────────── */
const _timers = {};
function debounce(key, fn, ms = 320) {
  clearTimeout(_timers[key]);
  _timers[key] = setTimeout(fn, ms);
}

/* ── Toast ───────────────────────────────────────────────── */
function toast(msg, err = false) {
  const box = document.getElementById('toast-box');
  const id  = 'ti' + Date.now();
  box.insertAdjacentHTML('beforeend', `
    <div id="${id}" class="toast-item ${err ? 'toast-err' : 'toast-ok'}">
      <i class="bi ${err ? 'bi-x-circle-fill' : 'bi-check-circle-fill'}"></i>
      <span>${esc(msg)}</span>
    </div>`);
  setTimeout(() => { const el = document.getElementById(id); if (el) el.remove(); }, 3000);
}

/* ── Format birthday (handles array or string) ───────────── */
function fmtDate(d) {
  if (!d) return '—';
  if (Array.isArray(d)) return `${d[0]}-${String(d[1]).padStart(2,'0')}-${String(d[2]).padStart(2,'0')}`;
  return String(d).slice(0, 10);
}
function fmtDateVal(d) {
  if (!d) return '';
  if (Array.isArray(d)) return `${d[0]}-${String(d[1]).padStart(2,'0')}-${String(d[2]).padStart(2,'0')}`;
  return String(d).slice(0, 10);
}

/* ════════ USERS ════════════════════════════════════════════ */
let _users = {};   // id → object cache

async function loadUsers() {
  const kw   = document.getElementById('user-kw').value.trim();
  const role = document.getElementById('user-role-filter').value;
  const p = new URLSearchParams({ size: 200 });
  if (kw)   p.set('keyword', kw);
  if (role) p.set('role', role);
  try {
    const raw  = await api('/api/users?' + p);
    const data = unwrap(raw);
    const list = asList(data);
    const total = (data && data.total != null) ? data.total : list.length;
    list.forEach(u => { _users[u.id] = u; });
    renderUsers(list);
    document.getElementById('users-info').textContent = `共 ${total} 条记录`;
  } catch (e) { toast('加载用户失败：' + e.message, true); }
}

function renderUsers(list) {
  const tbody = document.getElementById('users-body');
  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-st">
      <i class="bi bi-inbox"></i><span>暂无用户数据</span></div></td></tr>`;
    return;
  }
  tbody.innerHTML = list.map(u => {
    const roleCls = u.role === 'ADMIN' ? 'badge-role badge-admin' : 'badge-role';
    const stsBadge = u.active
      ? `<span class="badge-on">● 启用</span>`
      : `<span class="badge-off">● 停用</span>`;
    return `<tr>
      <td class="id-cell">#${u.id}</td>
      <td class="strong-cell">${esc(u.username)}</td>
      <td>${esc(u.displayName || '—')}</td>
      <td><span class="${roleCls}">${esc(u.role)}</span></td>
      <td>${esc(u.phone || '—')}</td>
      <td>${stsBadge}</td>
      <td class="text-nowrap">
        <button class="btn-edit me-1" onclick="openUserModal(${u.id})">
          <i class="bi bi-pencil me-1"></i>编辑
        </button>
        <button class="btn-del" onclick="delUser(${u.id})">
          <i class="bi bi-trash me-1"></i>删除
        </button>
      </td></tr>`;
  }).join('');
}

function openUserModal(id) {
  const isEdit = id != null;
  const u = isEdit ? (_users[id] || {}) : {};
  document.getElementById('userModalTitle').textContent = isEdit ? '编辑用户' : '新增用户';
  document.getElementById('u-id').value       = isEdit ? id : '';
  document.getElementById('u-username').value = u.username   || '';
  document.getElementById('u-display').value  = u.displayName|| '';
  document.getElementById('u-password').value = '';
  document.getElementById('u-phone').value    = u.phone      || '';
  document.getElementById('u-role').value     = u.role       || 'STAFF';
  document.getElementById('u-active').checked = isEdit ? !!u.active : true;
  document.getElementById('u-pwd-label').innerHTML = isEdit
    ? '密码 <small class="text-muted fw-normal">（留空不修改）</small>'
    : '密码 <span class="text-danger">*</span>';
  new bootstrap.Modal(document.getElementById('userModal')).show();
}

async function saveUser() {
  const id     = document.getElementById('u-id').value;
  const isEdit = !!id;
  const payload = {
    username:    document.getElementById('u-username').value.trim(),
    displayName: document.getElementById('u-display').value.trim(),
    role:        document.getElementById('u-role').value,
    phone:       document.getElementById('u-phone').value.trim(),
    active:      document.getElementById('u-active').checked,
  };
  const pwd = document.getElementById('u-password').value;
  if (pwd) payload.password = pwd;
  if (!payload.username || !payload.displayName) { toast('请填写用户名和姓名', true); return; }
  if (!isEdit && !pwd) { toast('请输入密码', true); return; }
  try {
    if (isEdit) {
      await api(`/api/users/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
    } else {
      await api('/api/users', { method: 'POST', body: JSON.stringify(payload) });
    }
    bootstrap.Modal.getInstance(document.getElementById('userModal')).hide();
    toast(isEdit ? '用户信息已更新' : '用户创建成功');
    await loadUsers();
  } catch (e) { toast((isEdit ? '更新' : '创建') + '用户失败：' + e.message, true); }
}

async function delUser(id) {
  if (!confirm('确认删除该用户？此操作不可恢复。')) return;
  try {
    await api(`/api/users/${id}`, { method: 'DELETE' });
    toast('用户已删除');
    await loadUsers();
  } catch (e) { toast('删除失败：' + e.message, true); }
}

/* ════════ CUSTOMERS ════════════════════════════════════════ */
let _custs = {};

async function loadCustomers() {
  const kw = document.getElementById('cust-kw').value.trim();
  const p  = new URLSearchParams({ size: 200 });
  if (kw) p.set('keyword', kw);
  try {
    const raw  = await api('/api/customers?' + p);
    const data = unwrap(raw);
    const list = asList(data);
    const total = (data && data.total != null) ? data.total : list.length;
    list.forEach(c => { _custs[c.id] = c; });
    renderCustomers(list);
    document.getElementById('custs-info').textContent = `共 ${total} 条记录`;
  } catch (e) { toast('加载客户失败：' + e.message, true); }
}

function renderCustomers(list) {
  const tbody = document.getElementById('custs-body');
  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-st">
      <i class="bi bi-inbox"></i><span>暂无客户数据</span></div></td></tr>`;
    return;
  }
  tbody.innerHTML = list.map(c => {
    const chips = (c.tags || '').split(',').filter(Boolean)
      .map(t => `<span class="tag-chip">${esc(t.trim())}</span>`).join('');
    return `<tr>
      <td class="id-cell">#${c.id}</td>
      <td class="strong-cell">${esc(c.name)}</td>
      <td>${esc(c.gender || '—')}</td>
      <td>${esc(c.phone  || '—')}</td>
      <td>${esc(c.email  || '—')}</td>
      <td>${chips || '<span class="text-muted">—</span>'}</td>
      <td>${fmtDate(c.birthday)}</td>
      <td class="text-nowrap">
        <button class="btn-edit me-1" onclick="openCustModal(${c.id})">
          <i class="bi bi-pencil me-1"></i>编辑
        </button>
        <button class="btn-del" onclick="delCustomer(${c.id})">
          <i class="bi bi-trash me-1"></i>删除
        </button>
      </td></tr>`;
  }).join('');
}

function openCustModal(id) {
  const isEdit = id != null;
  const c = isEdit ? (_custs[id] || {}) : {};
  document.getElementById('custModalTitle').textContent = isEdit ? '编辑客户' : '新增客户';
  document.getElementById('c-id').value       = isEdit ? id : '';
  document.getElementById('c-name').value     = c.name     || '';
  document.getElementById('c-gender').value   = c.gender   || '';
  document.getElementById('c-phone').value    = c.phone    || '';
  document.getElementById('c-email').value    = c.email    || '';
  document.getElementById('c-tags').value     = c.tags     || '';
  document.getElementById('c-birthday').value = fmtDateVal(c.birthday);
  document.getElementById('c-note').value     = c.note     || '';
  new bootstrap.Modal(document.getElementById('custModal')).show();
}

async function saveCustomer() {
  const id     = document.getElementById('c-id').value;
  const isEdit = !!id;
  const payload = {
    name:     document.getElementById('c-name').value.trim(),
    gender:   document.getElementById('c-gender').value,
    phone:    document.getElementById('c-phone').value.trim(),
    email:    document.getElementById('c-email').value.trim(),
    tags:     document.getElementById('c-tags').value.trim(),
    birthday: document.getElementById('c-birthday').value || null,
    note:     document.getElementById('c-note').value.trim(),
  };
  if (!payload.name) { toast('请输入客户姓名', true); return; }
  try {
    if (isEdit) {
      await api(`/api/customers/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
    } else {
      await api('/api/customers', { method: 'POST', body: JSON.stringify(payload) });
    }
    bootstrap.Modal.getInstance(document.getElementById('custModal')).hide();
    toast(isEdit ? '客户信息已更新' : '客户创建成功');
    await loadCustomers();
  } catch (e) { toast((isEdit ? '更新' : '创建') + '客户失败：' + e.message, true); }
}

async function delCustomer(id) {
  if (!confirm('确认删除该客户？此操作不可恢复。')) return;
  try {
    await api(`/api/customers/${id}`, { method: 'DELETE' });
    toast('客户已删除');
    await loadCustomers();
  } catch (e) { toast('删除失败：' + e.message, true); }
}

/* ── Init ─────────────────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', () => {
  loadUsers();
  loadCustomers();
});
</script>

<!doctype html>
<html lang="zh-cn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>医馆管理系统 — 登录</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --brand: #0d9488;
      --brand-dark: #0f766e;
      --brand-end: #0891b2;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #134e4a 0%, #0d9488 55%, #0891b2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }
    .login-wrap { width: 100%; max-width: 420px; padding: 16px; }
    .login-card {
      border: none;
      border-radius: 20px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.28);
      overflow: hidden;
    }
    .login-head {
      background: linear-gradient(135deg, var(--brand), var(--brand-end));
      padding: 40px 40px 30px;
      text-align: center;
      color: #fff;
    }
    .login-head .icon-wrap {
      width: 76px; height: 76px;
      background: rgba(255,255,255,0.18);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      margin-bottom: 14px;
      backdrop-filter: blur(8px);
    }
    .login-head h4 { font-weight: 700; font-size: 1.45rem; margin-bottom: 4px; }
    .login-head p  { opacity: .8; font-size: .9rem; margin: 0; }
    .login-body { padding: 36px 40px 32px; background: #fff; }
    .form-label  { font-weight: 500; color: #374151; font-size: .875rem; margin-bottom: 6px; }
    .input-wrap  { position: relative; }
    .input-wrap .bi {
      position: absolute; left: 13px; top: 50%;
      transform: translateY(-50%); color: #9ca3af; font-size: 1rem;
    }
    .input-wrap .form-control { padding-left: 38px; }
    .form-control {
      border-radius: 10px;
      border: 1.5px solid #e5e7eb;
      padding: 10px 14px;
      font-size: .95rem;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-control:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(13,148,136,.14);
      outline: none;
    }
    .btn-login {
      background: linear-gradient(135deg, var(--brand), var(--brand-end));
      border: none; border-radius: 10px;
      padding: 12px; font-size: 1rem; font-weight: 600;
      letter-spacing: .04em; color: #fff; width: 100%;
      transition: opacity .2s, transform .1s;
      cursor: pointer;
    }
    .btn-login:hover  { opacity: .9; transform: translateY(-1px); color: #fff; }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: .65; transform: none; cursor: default; }
    .foot { text-align: center; color: #9ca3af; font-size: .78rem; margin-top: 20px; }

    /* Modal tweaks */
    .modal-content { border: none; border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,.18); }
    .modal-header  { border-bottom: 1px solid #f1f5f9; padding: 20px 24px; }
    .modal-title   { font-weight: 700; color: #1e293b; font-size: 1rem; }
    .modal-body    { padding: 24px; }
    .modal-footer  { border-top: 1px solid #f1f5f9; padding: 14px 24px; }
    .btn-ok {
      background: linear-gradient(135deg, var(--brand), var(--brand-end));
      border: none; color: #fff; border-radius: 8px; padding: 8px 22px; font-weight: 600;
    }
    .btn-ok:hover { opacity: .9; color: #fff; }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <!-- Header -->
    <div class="login-head">
      <div class="icon-wrap">🏥</div>
      <h4>医馆管理系统</h4>
      <p>Medical Spa Management</p>
    </div>

    <!-- Form -->
    <div class="login-body">
      <form id="login-form" onsubmit="return false;">
        <div class="mb-3">
          <label for="f-username" class="form-label">用户名</label>
          <div class="input-wrap">
            <i class="bi bi-person"></i>
            <input type="text" class="form-control" id="f-username"
                   placeholder="请输入用户名" autocomplete="username">
          </div>
        </div>
        <div class="mb-4">
          <label for="f-password" class="form-label">密码</label>
          <div class="input-wrap">
            <i class="bi bi-lock"></i>
            <input type="password" class="form-control" id="f-password"
                   placeholder="请输入密码" autocomplete="current-password">
          </div>
        </div>
        <button type="submit" class="btn btn-login" id="login-btn" onclick="doLogin()">
          <span id="btn-text">登&nbsp;&nbsp;录</span>
          <span id="btn-spin" class="spinner-border spinner-border-sm ms-2 d-none" role="status"></span>
        </button>
      </form>
      <p class="foot">© 2024 医馆管理系统</p>
    </div>
  </div>
</div>

<!-- 登录失败 Modal 消息框 -->
<div class="modal fade" id="errModal" tabindex="-1" aria-labelledby="errModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered" style="max-width:360px">
    <div class="modal-content text-center">
      <div class="modal-header border-0 pb-0 justify-content-center">
        <span style="font-size:2.4rem">⚠️</span>
      </div>
      <div class="modal-body pt-2">
        <h5 class="modal-title mb-2" id="errModalLabel">登录失败</h5>
        <p id="err-detail" class="text-muted mb-0" style="font-size:.9rem">用户名或密码错误，请重试。</p>
      </div>
      <div class="modal-footer border-0 justify-content-center pt-0">
        <button type="button" class="btn btn-ok" data-bs-dismiss="modal">确&nbsp;&nbsp;定</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // 已登录则直接跳转
  if (localStorage.getItem('token')) {
    window.location.replace('/dashboard.html');
  }

  const errModal = new bootstrap.Modal(document.getElementById('errModal'));

  function showErr(msg) {
    document.getElementById('err-detail').textContent = msg || '用户名或密码错误，请重试。';
    errModal.show();
  }

  async function doLogin() {
    const username = document.getElementById('f-username').value.trim();
    const password = document.getElementById('f-password').value;
    if (!username || !password) { showErr('请输入用户名和密码。'); return; }

    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    document.getElementById('btn-text').textContent = '登录中…';
    document.getElementById('btn-spin').classList.remove('d-none');

    try {
      const resp = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const body = await resp.json().catch(() => ({}));
      if (!resp.ok) {
        const msg = body.message || body.error || '用户名或密码错误，请重试。';
        showErr(msg);
        return;
      }
      const data = body.data || body;
      localStorage.setItem('token', data.token || '');
      localStorage.setItem('currentUser', JSON.stringify(data.user || {}));
      window.location.replace('/dashboard.html');
    } catch (e) {
      showErr('网络异常，请检查连接后重试。');
    } finally {
      btn.disabled = false;
      document.getElementById('btn-text').innerHTML = '登&nbsp;&nbsp;录';
      document.getElementById('btn-spin').classList.add('d-none');
    }
  }

  document.getElementById('login-form').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
